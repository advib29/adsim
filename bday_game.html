<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Pop the Balloons 🎈</title>
<style>
:root{
  --bg1:#070410;
  --bg2:#150919;
  --pink2:#ff9cc8;
  --gold:#ffd9a8;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html,body{
  width:100%;height:100%;
  font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;
  color:#fff;overflow:hidden;
  background:
    radial-gradient(ellipse 80% 55% at 50% 0%, rgba(200,48,82,.22), transparent),
    linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 50%,#220c1e 100%);
  touch-action:manipulation;
}

.noise{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.028;
}

.header{
  position:fixed;top:0;left:0;right:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:linear-gradient(to bottom,rgba(7,4,16,.92),transparent);
}

.header-title{font-size:14px;color:rgba(255,255,255,.6);}

.score-wrap{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  border-radius:999px;padding:6px 14px;
  font-size:13px;color:rgba(255,255,255,.55);
}
.score-wrap b{color:#fff;font-size:14px;}

.grid-wrap{
  position:relative;z-index:5;
  width:100%;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:72px 16px 20px;
  gap:12px;
}

.grid-label{
  font-size:11px;color:rgba(255,255,255,.25);
  letter-spacing:2px;text-transform:uppercase;
}

/* 4 cols on phone for bigger tap targets */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  width:min(340px,94vw);
}

.cell{
  aspect-ratio:1;
  border-radius:16px;
  background:rgba(200,10,50,.18);
  border:2px solid rgba(200,10,50,.35);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:background .2s, border-color .2s, transform .08s;
  user-select:none;
  min-height:64px;
}

.cell::after{content:"🎈";font-size:24px;opacity:.15;}

.cell.green{
  background:rgba(0,210,100,.2);
  border-color:rgba(0,210,100,.6);
  animation:greenPulse .45s ease-in-out infinite alternate;
}
.cell.green::after{opacity:1;filter:hue-rotate(100deg) brightness(1.3);}
.cell.green:active{transform:scale(.88);}

.cell.popped{
  background:rgba(255,79,149,.1);
  border-color:rgba(255,79,149,.22);
  cursor:default;animation:none;
}
.cell.popped::after{content:"✓";font-size:20px;color:rgba(255,120,170,.45);font-weight:700;}

.cell.miss{animation:missFlash .28s ease;}

@keyframes greenPulse{
  from{box-shadow:0 0 8px rgba(0,210,100,.3);}
  to{box-shadow:0 0 24px rgba(0,210,100,.75);}
}
@keyframes missFlash{
  0%,100%{background:rgba(200,10,50,.18);}
  50%{background:rgba(255,40,40,.4);}
}

.progress-wrap{width:min(340px,94vw);}
.progress-bar{height:5px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#c83052,#ff9cc8);transition:width .4s ease;width:0%;}
.progress-text{text-align:center;font-size:11px;color:rgba(255,255,255,.22);letter-spacing:1px;margin-top:6px;}

.burst-h{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.3);opacity:0;z-index:75;pointer-events:none;animation:burst 3s ease-out forwards;}
.spark{position:fixed;left:50%;top:50%;width:6px;height:6px;border-radius:50%;background:white;z-index:74;pointer-events:none;animation:sparkMove 1.2s ease-out forwards;}
.confetti-el{position:fixed;top:-12px;border-radius:3px;opacity:.95;z-index:70;animation:confettiFall linear forwards;}
.float-heart{position:fixed;bottom:-40px;pointer-events:none;z-index:1;animation:floatUp linear forwards;}

@keyframes emojiBurst{
  0%{transform:translate(-50%,-50%) scale(.3);opacity:1;}
  60%{opacity:1;}
  100%{transform:translate(calc(-50% + var(--ex)),calc(-50% + var(--ey))) scale(1.2);opacity:0;}
}

@keyframes floatUp{0%{opacity:0;}10%{opacity:.4;}100%{transform:translateY(-110vh);opacity:0;}}
@keyframes burst{0%{opacity:0;transform:translate(-50%,-50%) scale(.3);}12%{opacity:1;}100%{opacity:0;transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(1.5) rotate(var(--r));}}
@keyframes sparkMove{0%{opacity:1;transform:translate(-50%,-50%);}100%{opacity:0;transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(.1);}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);}100%{transform:translateY(110vh) rotate(720deg);}}

/* ── results overlay ── */
.results{
  position:fixed;inset:0;z-index:90;
  display:none;align-items:center;justify-content:center;
  background:rgba(7,4,16,.78);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  animation:resultsIn .5s ease both;
}
.results.show{display:flex;}
@keyframes resultsIn{from{opacity:0;}to{opacity:1;}}
.results-card{
  width:min(320px,86vw);
  text-align:center;
  padding:30px 24px 26px;
  border-radius:22px;
  background:linear-gradient(170deg,rgba(255,255,255,.08),rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.14);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  animation:cardPop .55s cubic-bezier(.2,1.4,.4,1) .15s both;
}
@keyframes cardPop{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.results-title{font-size:22px;margin-bottom:4px;}
.results-sub{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
.stats-row{display:flex;justify-content:center;gap:26px;margin-bottom:24px;}
.stat{display:flex;flex-direction:column;gap:3px;}
.stat-num{font-size:24px;font-weight:700;color:var(--gold);}
.stat-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1.5px;text-transform:uppercase;}
.results-btns{display:flex;flex-direction:column;gap:10px;}
.btn{
  border:none;border-radius:999px;padding:13px 20px;
  font-size:15px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:transform .1s ease,opacity .2s;
}
.btn:active{transform:scale(.96);}
.btn-continue{
  background:linear-gradient(90deg,#c83052,#ff5f93);
  color:#fff;box-shadow:0 6px 24px rgba(255,79,149,.35);
}
.btn-retry{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  color:rgba(255,255,255,.75);
}
</style>
</head>
<body>
<div class="noise"></div>

<div class="header">
  <div class="header-title">🎈 Pop the green ones!</div>
  <div style="display:flex;gap:8px;align-items:center;">
    <div class="score-wrap" id="streakWrap" style="display:none;">🔥 <b id="streakNum">0</b></div>
    <div class="score-wrap">Popped <b id="scoreNum">0</b> / 24</div>
  </div>
</div>

<div class="grid-wrap">
  <div class="grid-label">Tap when green</div>
  <div class="grid" id="grid"></div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0 of 24 popped</div>
  </div>
</div>

<div class="results" id="results">
  <div class="results-card">
    <div class="results-title">All popped! 🎈</div>
    <div class="results-sub">Dr. Simran's Report Card</div>
    <div class="stats-row">
      <div class="stat"><span class="stat-num" id="statTime">–</span><span class="stat-label">Time</span></div>
      <div class="stat"><span class="stat-num">24</span><span class="stat-label">Pops</span></div>
      <div class="stat"><span class="stat-num" id="statMiss">0</span><span class="stat-label">Misses</span></div>
    </div>
    <div class="results-btns">
      <button class="btn btn-continue" onclick="window.location.href='bday_message_1.html'">Continue ➜</button>
      <button class="btn btn-retry" onclick="window.location.reload()">↻ Play again</button>
    </div>
  </div>
</div>

<script>
const TOTAL=24;
let popped=0,activeCells=[],gameTimer=null,gameOver=false,round=0,streak=0,misses=0,startTime=null;

function setStreak(v){
  streak=v;
  const w=document.getElementById('streakWrap');
  document.getElementById('streakNum').textContent=streak;
  w.style.display=streak>=2?'flex':'none';
}

const grid=document.getElementById('grid');
const cells=[];

// ── sounds (synthesized, no files needed) ──
let audioCtx=null;
function ensureAudio(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
}
function buzz(pattern){
  try{ if(navigator.vibrate) navigator.vibrate(pattern); }catch(err){}
}
function popSound(){
  try{
    ensureAudio();
    const t=audioCtx.currentTime;
    const sr=audioCtx.sampleRate;

    // layer 1 — the "crack": very short bright noise snap
    const len1=Math.floor(sr*0.035);
    const b1=audioCtx.createBuffer(1,len1,sr);
    const d1=b1.getChannelData(0);
    for(let i=0;i<len1;i++) d1[i]=(Math.random()*2-1)*Math.pow(1-i/len1,3);
    const s1=audioCtx.createBufferSource();s1.buffer=b1;
    const f1=audioCtx.createBiquadFilter();f1.type='highpass';f1.frequency.value=1800;
    const g1=audioCtx.createGain();
    g1.gain.setValueAtTime(.8,t);g1.gain.exponentialRampToValueAtTime(.001,t+.04);
    s1.connect(f1);f1.connect(g1);g1.connect(audioCtx.destination);s1.start(t);

    // layer 2 — the "body": rounder mid noise, slightly longer
    const len2=Math.floor(sr*0.1);
    const b2=audioCtx.createBuffer(1,len2,sr);
    const d2=b2.getChannelData(0);
    for(let i=0;i<len2;i++) d2[i]=(Math.random()*2-1)*Math.pow(1-i/len2,2);
    const s2=audioCtx.createBufferSource();s2.buffer=b2;
    const f2=audioCtx.createBiquadFilter();f2.type='lowpass';f2.frequency.value=650+Math.random()*250;
    const g2=audioCtx.createGain();
    g2.gain.setValueAtTime(.5,t);g2.gain.exponentialRampToValueAtTime(.001,t+.1);
    s2.connect(f2);f2.connect(g2);g2.connect(audioCtx.destination);s2.start(t);

    // layer 3 — the "thump": quick sub drop for physical punch
    const o=audioCtx.createOscillator(),g3=audioCtx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(170+Math.random()*50,t);
    o.frequency.exponentialRampToValueAtTime(55,t+.08);
    g3.gain.setValueAtTime(.4,t);g3.gain.exponentialRampToValueAtTime(.001,t+.09);
    o.connect(g3);g3.connect(audioCtx.destination);o.start(t);o.stop(t+.1);
  }catch(err){}
}
function winSound(){
  try{
    ensureAudio();
    const notes=[523.25,659.25,783.99,1046.5]; // C E G C
    notes.forEach((freq,i)=>{
      const t=audioCtx.currentTime+i*.14;
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(.0001,t);
      g.gain.exponentialRampToValueAtTime(.3,t+.02);
      g.gain.exponentialRampToValueAtTime(.001,t+.5);
      o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.55);
    });
  }catch(err){}
}
function missSound(){
  try{
    ensureAudio();
    const t=audioCtx.currentTime;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='triangle';
    o.frequency.setValueAtTime(160,t);
    o.frequency.exponentialRampToValueAtTime(90,t+.12);
    g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.13);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.15);
  }catch(err){}
}

for(let i=0;i<TOTAL;i++){
  const cell=document.createElement('div');
  cell.className='cell';
  cell.addEventListener('click',()=>tapCell(i));
  cell.addEventListener('touchstart',(e)=>{e.preventDefault();tapCell(i);},{passive:false});
  grid.appendChild(cell);
  cells.push(cell);
}

function tapCell(idx){
  if(gameOver) return;
  const cell=cells[idx];
  if(!cell.classList.contains('green')){
    cell.classList.add('miss');
    misses++;
    missSound();
    buzz([35,60,35]);
    setStreak(0);
    setTimeout(()=>cell.classList.remove('miss'),300);
    return;
  }
  popCell(idx);
}

function popCell(idx){
  const cell=cells[idx];
  if(cell.classList.contains('popped')) return;
  if(startTime===null) startTime=Date.now();
  popSound();
  buzz(50);
  const rect=cell.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;

  // big emoji explosion from cell center
  const emojis=["❤️","💕","💖","💗","💘","💞"];
  for(let i=0;i<10;i++){
    const e=document.createElement("div");
    e.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;font-size:${14+Math.random()*14}px;pointer-events:none;z-index:80;animation:emojiBurst .7s ease-out forwards;`;
    e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    const angle=(i/10)*Math.PI*2;
    const dist=25+Math.random()*40;
    e.style.setProperty('--ex',Math.cos(angle)*dist+'px');
    e.style.setProperty('--ey',Math.sin(angle)*dist+'px');
    e.style.animationDelay=Math.random()*.12+'s';
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),900);
  }

  cell.classList.remove('green');
  cell.classList.add('popped');
  activeCells = activeCells.filter(i => i !== idx);

  popped++;
  setStreak(streak+1);
  document.getElementById('scoreNum').textContent=popped;
  document.getElementById('progressFill').style.width=(popped/TOTAL*100)+'%';
  document.getElementById('progressText').textContent=popped+' of 24 popped';

  if(popped>=TOTAL){
    gameOver=true;
    clearTimeout(gameTimer);
    winSound();
    buzz([100,60,100,60,200]);
    bigBurst();
    setTimeout(()=>{bigBurst();},600);
    const secs=(Date.now()-startTime)/1000;
    document.getElementById('statTime').textContent=
      secs>=60 ? Math.floor(secs/60)+'m '+Math.round(secs%60)+'s' : secs.toFixed(1)+'s';
    document.getElementById('statMiss').textContent=misses;
    setTimeout(()=>{document.getElementById('results').classList.add('show');},1700);
    return;
  }

  // if no greens left, trigger next round
  if(activeCells.length === 0){
    clearTimeout(gameTimer);
    gameTimer=setTimeout(nextBalloon,300);
  }
}

function nextBalloon(){
  if(gameOver) return;
  round++;
  const myRound=round;

  // clear any remaining greens
  activeCells.forEach(i=>{
    if(!cells[i].classList.contains('popped')) cells[i].classList.remove('green');
  });
  activeCells=[];

  const avail=cells.map((_,i)=>i).filter(i=>!cells[i].classList.contains('popped') && !cells[i].classList.contains('green'));
  if(!avail.length) return;

  // 2 during warm-up, then up to 4 at once for the rest of the game
  const maxSimul = popped < 3 ? 2 : 4;
  const count = Math.min(Math.floor(Math.random() * maxSimul) + 1, avail.length);

  // shuffle avail and pick count
  const shuffled = avail.sort(()=>Math.random()-.5);
  const chosen = shuffled.slice(0, count);

  chosen.forEach(idx=>{
    cells[idx].classList.add('green');
    activeCells.push(idx);
  });

  // 3-pop warm-up, then full difficulty immediately: 0.65s windows
  const speed = popped < 3 ? 1200 : 650;

  // final notch: after warm-up, a green can suddenly turn red and jump
  // to another cell mid-window — stay sharp!
  if(popped >= 3 && Math.random() < 0.5){
    setTimeout(()=>{
      if(gameOver || myRound!==round) return;
      const greens = activeCells.filter(i=>cells[i].classList.contains('green'));
      if(!greens.length) return;
      const victim = greens[Math.floor(Math.random()*greens.length)];
      const spots = cells.map((_,i)=>i).filter(i=>
        !cells[i].classList.contains('popped') &&
        !cells[i].classList.contains('green'));
      if(!spots.length) return;
      const target = spots[Math.floor(Math.random()*spots.length)];
      cells[victim].classList.remove('green');
      cells[target].classList.add('green');
      activeCells = activeCells.filter(i=>i!==victim);
      activeCells.push(target);
    }, speed*0.45);
  }

  // auto-clear after timeout if not popped (only for this round)
  setTimeout(()=>{
    if(gameOver || myRound!==round) return;
    const stillGreen = activeCells.filter(i=>cells[i].classList.contains('green'));
    if(stillGreen.length) setStreak(0);
    stillGreen.forEach(i=>cells[i].classList.remove('green'));
    activeCells = activeCells.filter(i=>!stillGreen.includes(i));
    if(activeCells.length===0){
      gameTimer=setTimeout(nextBalloon,250);
    }
  }, speed);
}

setTimeout(nextBalloon,1000);

function bigBurst(){
  const items=["❤️","🎂","🎉","💕","✨","🎈","💖","🥳"];
  for(let k=0;k<40;k++){
    const h=document.createElement("div");
    h.className="burst-h";
    h.textContent=items[Math.floor(Math.random()*items.length)];
    const a=Math.random()*Math.PI*2,d=60+Math.random()*280;
    h.style.setProperty("--x",Math.cos(a)*d+"px");
    h.style.setProperty("--y",Math.sin(a)*d+"px");
    h.style.setProperty("--r",(Math.random()*160-80)+"deg");
    h.style.fontSize=16+Math.random()*22+"px";
    h.style.animationDelay=Math.random()*.5+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),3500);
  }
  for(let k=0;k<55;k++){
    const s=document.createElement("div");
    s.className="spark";
    const a=Math.random()*Math.PI*2,d=60+Math.random()*300;
    s.style.setProperty("--x",Math.cos(a)*d+"px");
    s.style.setProperty("--y",Math.sin(a)*d+"px");
    s.style.background=["#fff","#ffd9a8","#ff9cc8","#ff75ad","#ff4f95","#ffd166"][Math.floor(Math.random()*6)];
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1300);
  }
}

function confetti(){
  const colors=["#c83052","#ff5f93","#ffd166","#fff7ee","#f5d8d2","#ff9cc8","#ffd9a8"];
  for(let i=0;i<100;i++){
    const c=document.createElement("div");
    c.className="confetti-el";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=6+Math.random()*7+"px";
    c.style.height=9+Math.random()*12+"px";
    c.style.borderRadius=Math.random()>.5?"50%":"3px";
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    c.style.animationDuration=2.5+Math.random()*2+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5500);
  }
}

const fi=["❤️","💕","✨","💖"];
function fh(){
  const h=document.createElement("div");
  h.className="float-heart";
  h.textContent=fi[Math.floor(Math.random()*fi.length)];
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=10+Math.random()*10+"px";
  h.style.animationDuration=7+Math.random()*5+"s";
  h.style.opacity=0.15+Math.random()*.2;
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),13000);
}
setInterval(fh,1800);
</script>
</body>
