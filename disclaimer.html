<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Disclaimer 💌</title>

<style>
:root{
  --paper:#fff7ee;
  --paper2:#f6eadc;
  --ink:#2a1d1f;
  --muted:#765f61;
  --red:#c83052;
  --pink:#ff5f93;
  --line:rgba(42,29,31,.16);
  --shadow:0 18px 48px rgba(0,0,0,.40);
  --radius:22px;
}

*{ box-sizing:border-box; }

html,body{ 
  margin:0;
  width:100%;
  height:100%;
}

body{
  min-height:100vh;
  font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:var(--ink);

  background:
    radial-gradient(900px 500px at 20% 10%, rgba(255,95,147,.25), transparent 60%),
    radial-gradient(900px 600px at 85% 20%, rgba(255,198,120,.16), transparent 60%),
    linear-gradient(145deg,#100b12,#24111b 55%,#100b12);

  display:grid;
  place-items:center;

  padding:8px;
  overflow:hidden;
}

.particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:0;
}

.particle{
  position:absolute;
  bottom:-30px;
  font-size:16px;
  opacity:0;
  animation:floatUp linear forwards;
}

@keyframes floatUp{
  0%{ transform:translateY(0) scale(.8); opacity:0; }
  15%{ opacity:.75; }
  100%{ transform:translateY(-120vh) scale(1.2); opacity:0; }
}

.wrap{
  width:min(1040px,100%);
  position:relative;
  z-index:2;
}

.file-tab{
  display:inline-flex;
  align-items:center;
  gap:7px;

  background:#f5d8d2;
  color:#8b2639;

  border:1px solid rgba(255,255,255,.35);
  border-bottom:0;

  border-radius:15px 15px 0 0;

  padding:7px 13px;

  font-size:10px;
  font-weight:900;

  letter-spacing:.07em;
  text-transform:uppercase;

  margin-left:16px;
}

.paper{
  background:
    linear-gradient(90deg,rgba(42,29,31,.045) 1px, transparent 1px),
    linear-gradient(var(--paper),var(--paper2));

  background-size:28px 28px, auto;

  border:1px solid rgba(255,255,255,.32);

  border-radius:var(--radius);

  box-shadow:var(--shadow);

  padding:14px;

  overflow:hidden;

  animation:pageEnter .85s ease both;
}

@keyframes pageEnter{
  from{ opacity:0; transform:translateY(14px) scale(.985); }
  to{ opacity:1; transform:translateY(0) scale(1); }
}

.disclaimer{
  min-height:620px;
  display:grid;
  place-items:center;
  text-align:center;
}

.inner{
  width:min(760px,100%);
}

.kicker{
  display:inline-flex;

  color:#8b2639;

  background:rgba(200,48,82,.09);

  border:1px solid rgba(200,48,82,.18);

  padding:6px 10px;

  border-radius:999px;

  font-size:10px;
  font-weight:900;

  letter-spacing:.07em;
  text-transform:uppercase;
}

.title{
  margin:12px 0 0;

  color:#8b2639;

  font-size:clamp(42px,6vw,64px);
  line-height:.95;
  font-weight:1000;

  letter-spacing:-.055em;
}

.subtitle{
  margin:10px auto 0;

  color:var(--muted);

  line-height:1.45;

  font-size:13px;

  max-width:650px;
}

.notice{
  margin:14px auto 0;

  background:rgba(255,255,255,.42);

  border:1px solid var(--line);

  border-radius:20px;

  padding:12px;

  text-align:left;
}

.notice-title{
  text-align:center;

  color:#8b2639;

  font-size:13px;
  font-weight:1000;

  letter-spacing:.04em;

  margin-bottom:9px;
}

.checks{
  display:grid;
  gap:7px;
}

.check-row{
  display:flex;
  align-items:flex-start;
  gap:9px;

  padding:8px 10px;

  background:rgba(255,255,255,.45);

  border:1px solid rgba(42,29,31,.12);

  border-radius:14px;

  cursor:pointer;

  transition:.25s ease;
}

.check-row:hover{
  background:rgba(255,255,255,.65);
  transform:translateY(-1px);
}

.check-row input{
  appearance:none;

  width:18px;
  height:18px;

  flex:0 0 18px;

  margin-top:0;

  border-radius:6px;

  border:2px solid rgba(200,48,82,.52);

  background:rgba(255,255,255,.65);

  display:grid;
  place-items:center;

  cursor:pointer;
}

.check-row input:checked{
  border-color:transparent;

  background:
    linear-gradient(135deg,#c83052,#ff5f93);
}

.check-row input:checked::after{
  content:"✓";

  color:white;

  font-size:12px;
  font-weight:1000;
}

.check-row span{
  color:#4b3035;

  font-size:12px;
  font-weight:700;

  line-height:1.32;
}

.check-row em{
  font-style:normal;

  color:#8b2639;

  font-weight:1000;
}

.lock-text{
  margin-top:10px;

  text-align:center;

  color:#8b2639;

  background:rgba(200,48,82,.10);

  border:1px solid rgba(200,48,82,.20);

  padding:8px 12px;

  border-radius:14px;

  font-size:10px;
  font-weight:1000;

  letter-spacing:.07em;
  text-transform:uppercase;
}

.actions{
  text-align:center;

  margin-top:10px;
}

button{
  border:0;

  border-radius:16px;

  padding:11px 20px;

  font-size:14px;
  font-weight:1000;

  color:white;

  background:
    linear-gradient(135deg,#c83052,#ff5f93);

  box-shadow:
    0 12px 26px rgba(200,48,82,.30);

  opacity:.45;

  filter:blur(.8px);

  pointer-events:none;

  cursor:not-allowed;

  transition:
    transform .3s ease,
    filter .3s ease,
    opacity .3s ease;
}

button.unlocked{
  opacity:1;

  filter:none;

  pointer-events:auto;

  cursor:pointer;
}

button.unlocked:hover{
  filter:brightness(1.05);

  transform:translateY(-1px);
}

.vertical-signature{
  margin-top:13px;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;

  color:rgba(139,38,57,.42);

  font-size:18px;
  font-weight:1000;

  letter-spacing:.14em;

  user-select:none;
  text-align:center;
}

.vertical-signature b{
  color:rgba(200,48,82,.70);

  font-size:24px;

  letter-spacing:0;
}

.copyright{
  margin-top:6px;

  color:rgba(139,38,57,.46);

  font-size:12px;
  font-weight:1000;

  letter-spacing:.10em;
}

.copyright .brand{
  color:rgba(139,38,57,.62);
  font-size:14px;
  font-weight:1000;
  letter-spacing:.02em;
}

.copyright .brand::first-letter{
  font-size:16px;
}

@media(max-height:720px) and (min-width:901px){

  .paper{ padding:12px; }

  .disclaimer{ min-height:560px; }

  .title{
    font-size:50px;
    margin-top:8px;
  }

  .subtitle{
    font-size:12px;
    line-height:1.35;
    margin-top:8px;
  }

  .notice{
    margin-top:10px;
    padding:10px;
  }

  .checks{ gap:6px; }

  .check-row{ padding:7px 9px; }

  .check-row span{
    font-size:11.2px;
    line-height:1.25;
  }

  .lock-text{
    margin-top:8px;
    padding:7px 10px;
  }

  button{ padding:10px 18px; }

  .vertical-signature{
    margin-top:10px;
    font-size:16px;
  }

  .copyright{
    margin-top:4px;
    font-size:11px;
  }

  .copyright .brand{ font-size:13px; }

  .copyright .brand::first-letter{ font-size:15px; }
}

@media(max-width:900px){

  body{
    place-items:start center;
    overflow:auto;
  }

  .disclaimer{ min-height:auto; }
}

@media(max-width:460px){

  body{ padding:10px; }

  .file-tab{
    margin-left:10px;

    font-size:9px;

    padding:8px 10px;
  }

  .paper{
    padding:13px 11px;

    border-radius:20px;
  }

  .title{ font-size:42px; }

  .subtitle{
    font-size:12px;
    line-height:1.35;
  }

  .notice{ padding:10px; }

  .check-row{
    gap:7px;
    padding:7px 8px;
  }

  .check-row span{
    font-size:10.7px;
    line-height:1.22;
  }

  .lock-text{
    font-size:8.8px;
    padding:7px 8px;
  }

  button{
    font-size:12.5px;
    padding:10px 16px;
  }

  .vertical-signature{
    font-size:15px;
    gap:7px;
    letter-spacing:.06em;
  }

  .vertical-signature b{ font-size:19px; }

  .copyright{
    margin-top:4px;
    font-size:10px;
    letter-spacing:.08em;
  }

  .copyright .brand{ font-size:12px; }

  .copyright .brand::first-letter{ font-size:14px; }
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="wrap">

  <div class="file-tab">
    ⚠️ Disclaimer
  </div>

  <main class="paper">

    <section class="disclaimer">

      <div class="inner">

        <div class="kicker">
          Mandatory Pre-Case Consent
        </div>

        <h1 class="title">
          Disclaimer
        </h1>

        <div class="subtitle">
          Before proceeding further, madam must confirm a few very serious,
          medically unnecessary, but important life declarations 🤭
        </div>

        <div class="notice">

          <div class="notice-title">
            Tick all boxes to continue:
          </div>

          <div class="checks">

            <label class="check-row">
              <input type="checkbox" class="consent-check">
              <span>I confirm that I am <em>Dr. Simran Sharma</em>, also known as <em>Dr. Love</em>, and the permanent heart-risk factor of this patient.</span>
            </label>

            <label class="check-row">
              <input type="checkbox" class="consent-check">
              <span>I understand what comes next may contain romance, drama, teasing, emotional evidence, and unnecessary but cute overthinking.</span>
            </label>

            <label class="check-row">
              <input type="checkbox" class="consent-check">
              <span>I consent to being called dangerously cute, dangerously pretty, and occasionally DHW in private AdSim records.</span>
            </label>

            <label class="check-row">
              <input type="checkbox" class="consent-check">
              <span>I accept that from today, I take full responsibility for this patient as stated in the Adsim 2026 contract.</span>
            </label>

            <label class="check-row">
              <input type="checkbox" class="consent-check">
              <span>I agree to answer the next question honestly and romantically.</span>
            </label>

          </div>

          <div class="lock-text" id="lockText">
            Tick all boxes to unlock loyalty test
          </div>

          <div class="actions">
            <button id="nextBtn">
              Proceed to Loyalty Test 📝
            </button>
          </div>

        </div>

        <div class="vertical-signature">
          <span>SIMRAN</span>
          <b>♡</b>
          <span>ADVAITA</span>
        </div>

        <div class="copyright">
          © <span class="brand">Adsim</span> 2026
        </div>

      </div>

    </section>

  </main>

</div>

<script>
const checks = document.querySelectorAll(".consent-check");
const nextBtn = document.getElementById("nextBtn");
const lockText = document.getElementById("lockText");

function updateButton(){

  const allChecked =
    [...checks].every(check => check.checked);

  if(allChecked){

    nextBtn.classList.add("unlocked");

    lockText.textContent =
      "Access approved for Dr. Love 🤭";

  }else{

    nextBtn.classList.remove("unlocked");

    lockText.textContent =
      "Tick all boxes to unlock loyalty test";

  }
}

checks.forEach(check => {
  check.addEventListener("change", updateButton);
});

nextBtn.addEventListener("click", () => {

  if(nextBtn.classList.contains("unlocked")){

    window.location.href = "mcq.html";

  }

});

const particles =
  document.getElementById("particles");

function createParticle(){

  const emojis = [
    "💌",
    "❤️",
    "✨",
    "💘",
    "🩺",
    "📋"
  ];

  const p =
    document.createElement("div");

  p.className = "particle";

  p.textContent =
    emojis[
      Math.floor(Math.random() * emojis.length)
    ];

  p.style.left =
    Math.random() * 100 + "vw";

  p.style.fontSize =
    13 + Math.random() * 16 + "px";

  p.style.animationDuration =
    4 + Math.random() * 4 + "s";

  particles.appendChild(p);

  setTimeout(() => {
    p.remove();
  }, 8000);
}

setInterval(createParticle,900);
</script>

</body>
</html>
