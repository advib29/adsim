<title>Thank You, Dr. Sia ❤️</title>
<style>
:root{--bg1:#070410;--bg2:#150919;--bg3:#220c1e;--pink2:#ff9cc8;--gold:#ffd9a8;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;color:#fff;overflow:hidden;
background:radial-gradient(ellipse 80% 55% at 50% 0%, rgba(200,48,82,.22), transparent),radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,217,168,.10), transparent),linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);}
.noise{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.028;}

.stage{position:relative;z-index:2;width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center;gap:0;}

.tag{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);border-radius:999px;padding:6px 14px;font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:var(--gold);margin-bottom:24px;animation:fadeInUp .8s ease .1s both;}
.tag-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:blink 2s ease-in-out infinite;}

.logo-svg{width:min(280px,76vw);height:auto;overflow:visible;filter:drop-shadow(0 0 22px rgba(255,255,255,.2));animation:fadeInUp 1.2s ease .3s both;}

.tagline{margin-top:28px;font-family:"Dancing Script",cursive;font-size:clamp(32px,8vw,44px);color:#ff9fc7;line-height:1.3;animation:fadeInUp .8s ease 1.2s both;}

.message{margin-top:28px;font-family:"Dancing Script",cursive;font-size:clamp(38px,10vw,54px);color:rgba(255,255,255,.92);line-height:1.4;max-width:340px;animation:fadeInUp .8s ease 1.2s both;}

.footer{margin-top:28px;font-size:10px;color:rgba(255,255,255,.15);letter-spacing:2px;text-transform:uppercase;animation:fadeInUp .8s ease 2s both;}

.float-heart{position:fixed;bottom:-40px;pointer-events:none;z-index:1;animation:floatUp linear forwards;}

@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes floatUp{0%{opacity:0;}10%{opacity:.4;}100%{transform:translateY(-110vh);opacity:0;}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
</style>
