<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy 6 Month Anniversary ❤️</title>

<style>
:root{
  --paper:#fff7ee;
  --paper2:#f6eadc;
  --ink:#2a1d1f;
  --muted:#765f61;
  --red:#c83052;
  --pink:#ff5f93;
  --line:rgba(42,29,31,.16);
  --shadow:0 24px 70px rgba(0,0,0,.48);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  min-height:100%;
}

body{
  min-height:100vh;
  font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:var(--ink);
  background:
    radial-gradient(900px 500px at 18% 12%, rgba(255,95,147,.30), transparent 60%),
    radial-gradient(900px 600px at 86% 20%, rgba(255,198,120,.18), transparent 60%),
    linear-gradient(145deg,#100b12,#24111b 55%,#100b12);
  display:grid;
  place-items:center;
  padding:18px;
  overflow:hidden;
}

.card{
  position:relative;
  z-index:5;
  width:min(820px,94vw);
  text-align:center;
  border-radius:32px;
  padding:48px 30px 42px;
  background:
    linear-gradient(90deg,rgba(42,29,31,.045) 1px, transparent 1px),
    linear-gradient(var(--paper),var(--paper2));
  background-size:28px 28px, auto;
  border:1px solid rgba(255,255,255,.35);
  box-shadow:var(--shadow);
  animation:pop .9s ease both;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  inset:14px;
  border:1px dashed rgba(200,48,82,.22);
  border-radius:24px;
  pointer-events:none;
}

@keyframes pop{
  from{
    opacity:0;
    transform:translateY(18px) scale(.94);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.mini-lock{
  width:78px;
  height:78px;
  margin:0 auto 18px;
  border-radius:50%;
  display:grid;
  place-items:center;
  font-size:34px;
  background:rgba(200,48,82,.09);
  border:1px solid rgba(200,48,82,.20);
  box-shadow:
    0 16px 34px rgba(200,48,82,.12),
    inset 0 0 0 8px rgba(255,255,255,.28);
}

h1{
  margin:0;
  color:#8b2639;
  font-size:clamp(42px,7vw,76px);
  line-height:1.02;
  letter-spacing:-.055em;
  font-weight:1000;
}

h1 span{
  display:block;
}

.cursive{
  margin-top:8px;
  display:block;
  color:#c83052;
  font-family:"Segoe Script","Brush Script MT","Lucida Handwriting",cursive;
  font-size:clamp(40px,7vw,82px);
  font-weight:500;
  letter-spacing:-.045em;
  line-height:.95;
}

.subtitle{
  margin:22px auto 0;
  color:var(--muted);
  font-size:15.5px;
  line-height:1.7;
  max-width:630px;
}

.soft-line{
  margin:24px auto 0;
  width:min(360px,80%);
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,48,82,.35),transparent);
}

.sign{
  margin-top:24px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  color:rgba(139,38,57,.52);
  font-size:19px;
  font-weight:1000;
  letter-spacing:.12em;
}

.sign b{
  color:rgba(200,48,82,.78);
  font-size:30px;
  letter-spacing:0;
}

.status{
  margin-top:22px;
  color:rgba(139,38,57,.72);
  font-size:11px;
  font-weight:1000;
  letter-spacing:.10em;
  text-transform:uppercase;
  transition:.45s ease;
}

.status.hide{
  opacity:0;
  transform:translateY(8px);
  pointer-events:none;
}

.case-btn{
  margin-top:0;
  border:0;
  cursor:pointer;
  border-radius:17px;
  padding:13px 24px;
  font-size:14px;
  font-weight:1000;
  color:white;
  background:linear-gradient(135deg,#c83052,#ff5f93);
  box-shadow:0 14px 28px rgba(200,48,82,.32);
  opacity:0;
  transform:translateY(12px) scale(.96);
  pointer-events:none;
  transition:.5s ease;
}

.case-btn.show{
  margin-top:22px;
  opacity:1;
  transform:translateY(0) scale(1);
  pointer-events:auto;
}

.case-btn:hover{
  filter:brightness(1.06);
  transform:translateY(-1px);
}

.confetti{
  position:fixed;
  top:-14px;
  width:9px;
  height:14px;
  border-radius:3px;
  opacity:.95;
  z-index:20;
  animation:confettiFall linear forwards;
}

@keyframes confettiFall{
  0%{
    transform:translateY(-20px) rotate(0deg);
    opacity:1;
  }
  100%{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}

.firework{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  z-index:30;
  pointer-events:none;
  background:#fff7ee;
  box-shadow:
    0 -42px #f5d8d2,
    30px -30px #ff5f93,
    42px 0 #fff7ee,
    30px 30px #c83052,
    0 42px #f5d8d2,
    -30px 30px #ff5f93,
    -42px 0 #fff7ee,
    -30px -30px #c83052,
    0 -64px rgba(255,247,238,.9),
    45px -45px rgba(245,216,210,.9),
    64px 0 rgba(255,95,147,.9),
    45px 45px rgba(200,48,82,.9),
    0 64px rgba(255,247,238,.9),
    -45px 45px rgba(245,216,210,.9),
    -64px 0 rgba(255,95,147,.9),
    -45px -45px rgba(200,48,82,.9);
  animation:boom 1.05s ease-out forwards;
}

@keyframes boom{
  0%{
    transform:scale(.1);
    opacity:0;
  }
  20%{
    opacity:1;
  }
  100%{
    transform:scale(1.65);
    opacity:0;
  }
}

.float{
  position:fixed;
  bottom:-30px;
  pointer-events:none;
  font-size:18px;
  opacity:0;
  animation:floatUp linear forwards;
}

@keyframes floatUp{
  0%{
    transform:translateY(0) scale(.8);
    opacity:0;
  }
  15%{
    opacity:.75;
  }
  100%{
    transform:translateY(-120vh) scale(1.2);
    opacity:0;
  }
}

@media(max-width:520px){
  .card{
    padding:40px 18px 36px;
  }

  .mini-lock{
    width:66px;
    height:66px;
    font-size:29px;
  }

  h1{
    font-size:43px;
  }

  .cursive{
    font-size:48px;
  }

  .subtitle{
    font-size:14px;
  }

  .sign{
    font-size:14px;
    letter-spacing:.07em;
    gap:8px;
  }

  .sign b{
    font-size:23px;
  }
}
</style>
</head>

<body>

<div class="card">
  <div class="mini-lock">❤️</div>

  <h1>
    Happy 6 Month
    <span class="cursive">Anniversary</span>
  </h1>

  <div class="subtitle">
    Congratulations Dr. Sia… 6 months completed with the cutest chaos,
    endless teasing, soft moments, and one patient who is now permanently attached.
    <br><br>
    From Mr. Addu to Dr. Simu — this is just the beginning.
  </div>

  <div class="soft-line"></div>

  <div class="sign">
    <span>SIMRAN</span>
    <b>♡</b>
    <span>ADVAITA</span>
  </div>

  <div class="status" id="statusText">
    celebration loading...
  </div>

  <button class="case-btn" id="caseBtn">
    Open Case File 💌
  </button>
</div>

<script>
const statusText = document.getElementById("statusText");
const caseBtn = document.getElementById("caseBtn");

function launchConfetti(){
  const colors = ["#c83052","#ff5f93","#fff7ee","#f5d8d2","#ffd1dc"];

  for(let i = 0; i < 100; i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * .5 + "s";
    c.style.animationDuration = 2.8 + Math.random() * 1.8 + "s";
    document.body.appendChild(c);

    setTimeout(() => c.remove(), 5600);
  }
}

function launchFireworksBurst(){
  for(let i = 0; i < 8; i++){
    setTimeout(() => {
      const f = document.createElement("div");
      f.className = "firework";
      f.style.left = 12 + Math.random() * 76 + "vw";
      f.style.top = 10 + Math.random() * 48 + "vh";
      document.body.appendChild(f);

      setTimeout(() => f.remove(), 1200);
    }, i * 120);
  }
}

function startAnniversaryShow(){
  statusText.classList.add("hide");

  setTimeout(() => {
    statusText.style.display = "none";
    caseBtn.classList.add("show");
  }, 450);

  launchConfetti();
  launchFireworksBurst();

  const show = setInterval(() => {
    launchConfetti();
    launchFireworksBurst();
  }, 1000);

  setTimeout(() => {
    clearInterval(show);
  }, 10000);
}

function createFloat(){
  const emojis = ["❤️","✨","💌","🎆","🩺","💘"];

  const p = document.createElement("div");
  p.className = "float";
  p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  p.style.left = Math.random() * 100 + "vw";
  p.style.fontSize = 14 + Math.random() * 18 + "px";
  p.style.animationDuration = 4 + Math.random() * 4 + "s";

  document.body.appendChild(p);

  setTimeout(() => p.remove(), 8000);
}

setInterval(createFloat,800);

window.addEventListener("load", () => {
  setTimeout(() => {
    startAnniversaryShow();
  }, 7000);
});

caseBtn.addEventListener("click", () => {
  window.location.href = "contract.html";
});
</script>

</body>
</html>
